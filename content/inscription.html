<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitabi - Inscription</title>
 <link rel="stylesheet" href="../style/style.css">
</head>
<body>

  <!-- Barre de navigation -->
  <nav id="navbar"></nav>

  <div class="auth-page">
    <a href="index.html" class="auth-logo">📖 Kitabi</a>
    <p class="auth-sub">Rejoignez la communauté Kitabi</p>

    <div class="form-card auth-card">
      <h2>Créer un compte</h2>
      <div id="err-register" class="alerte" style="display:none"></div>

      <form id="form-register" novalidate>
        <div class="form-group">
          <label for="r-nom">Nom complet</label>
          <input type="text" id="r-nom" placeholder="Ahmed Benali" required>
          <span class="err-msg" id="e-nom"></span>
        </div>
        <div class="form-group">
          <label for="r-email">Adresse email</label>
          <input type="email" id="r-email" placeholder="votre@email.dz" required>
          <span class="err-msg" id="e-email"></span>
        </div>
        <div class="form-group">
          <label for="r-mdp">Mot de passe</label>
          <input type="password" id="r-mdp" placeholder="Min. 8 car., 1 maj., 1 chiffre, 1 spécial" required>
          <span class="err-msg" id="e-mdp"></span>
          
          <!-- Indicateur visuel de force -->
          <div class="force-barres">
            <div id="f1" class="barre-force"></div>
            <div id="f2" class="barre-force"></div>
            <div id="f3" class="barre-force"></div>
            <div id="f4" class="barre-force"></div>
          </div>
        </div>
        <div class="form-group">
          <label for="r-confirm">Confirmer le mot de passe</label>
          <input type="password" id="r-confirm" placeholder="••••••••" required>
          <span class="err-msg" id="e-confirm"></span>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Créer mon compte</button>
      </form>

      <p class="auth-switch-text">
        Déjà un compte ? <a href="connexion.html">Se connecter</a>
      </p>
    </div>
  </div>

  <footer>
    <div class="f-inner">
      <span class="f-logo">📖 Kitabi</span>
      <nav>
        <a href="index.html">Accueil</a>
        <a href="catalogue.html">Catalogue</a>
        <a href="favoris.html">Favoris</a>
      </nav>
      <p>© 2026 Kitabi — Algérie</p>
    </div>
  </footer>

  
  <script src="../javascript/books.js" defer></script>
 <script src="../javascript/app.js" defer></script>
  <script src="../javascript/inscription.js" defer></script>

</body>
</html>
